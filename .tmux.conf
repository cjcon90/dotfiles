# ── Prefix ────────────────────────────────────────────────────────────────────
set -g prefix C-b
bind C-b send-prefix

# ── General ───────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g set-clipboard on
set -g base-index 1           # windows start at 1
set -g pane-base-index 1      # panes start at 1
set -gw renumber-windows on   # renumber on close
set -g history-limit 50000
set -sg escape-time 0         # no delay for ESC in vim
set -g focus-events on
set -g status-interval 5

# ── Vim navigation ────────────────────────────────────────────────────────────
set -gw mode-keys vi

# Copy mode vim bindings
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Pane navigation (Ctrl+hjkl, no prefix needed)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Send Ctrl+L (clear screen) through with prefix
bind C-l send-keys C-l

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Splits ────────────────────────────────────────────────────────────────────
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Quick config reload ───────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# ── Dracula config ────────────────────────────────────────────────────────────
set -g @dracula-plugins "git cpu-usage ram-usage time"
set -g @dracula-show-powerline true
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session
set -g @dracula-git-no-repo-message ""
set -g @dracula-time-format "%H:%M %d/%m"
set -g @dracula-cpu-usage-label "CPU"
set -g @dracula-ram-usage-label "RAM"

# ── Resurrect + Continuum ─────────────────────────────────────────────────────
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
